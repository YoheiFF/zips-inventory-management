services:
  mysql:
    image: mysql:8.0
    container_name: zips-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: Zips
      MYSQL_USER: appuser
      MYSQL_PASSWORD: apppass
      TZ: Asia/Tokyo
    ports:
      - "3308:3306"
    volumes:
      - ./mysql-data:/var/lib/mysql
      - ./mysql-init/01_init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
    command: ["--default-authentication-plugin=mysql_native_password"]
