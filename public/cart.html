<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>カート一覧</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
  <!-- 共通を先に読み込み、ページCSSを後で上書き -->
  <link rel="stylesheet" href="css/common.css">
  <link rel="stylesheet" href="css/cart.css" />
  <link rel="icon" href="img/art_the_line_logo.png">
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="js/cart.js"></script>
</head>

<body>
  <div id="header-container"></div>

  <main class="main">
    <section class="cart">
      <div class="cart__head">
        <span class="cart__col cart__col--left"></span>
        <span class="cart__col cart__col--name cart__col--message">下記商品を発注いたします。</span>
        <span class="cart__col cart__col--qty">発注数</span>
        <span class="cart__col cart__col--stock">現在の在庫</span>
      </div>

      <!-- ここにJSで明細を描画 -->
      <div id="cart-items-mount"></div>
    </section>

  </main>
  <footer class="main-footer">
        <div class="footerBtn-wrap">
      <button class="footer-btn" type="button" id="btnCancel">キャンセル</button>
      <button class="footer-btn" type="button" id="btnOrder">発注</button>
    </div>
  </footer>
    <script src="js/load-header.js"></script>
</body>
</html>
