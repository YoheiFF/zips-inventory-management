<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>商品メンテナンス画面</title>

  <!-- 共通CSS → ページCSS の順 -->
  <link rel="stylesheet" href="css/common.css" />
  <link rel="stylesheet" href="css/item-maintenance.css" />
  <link rel="icon" href="img/art_the_line_logo.png">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet" />
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script defer src="js/load-header.js"></script>
  <script defer src="js/item-maintenance.js"></script>
</head>

<body>
  <div id="header-container"></div>

  <main class="item">
    <!-- 2カラム：検索 / 新規登録 -->
    <section class="item__top">
      <div class="item__search">
        <h3 class="item__title">商品を探す</h3>
        <div class="row">
          <input id="kw" class="input" type="text" placeholder="商品名を入力" />
          <button id="btnFilter" class="btn btn--primary">絞り込み</button>
        </div>
      </div>
      <div class="item__create">
        <div class="row">
          <button id="btnCreate" class="btn btn--primary">新規登録</button>
        </div>
      </div>
    </section>

    <!-- データグリッド -->
    <section class="data-card mainObject">
      <table class="grid">
        <thead>
          <tr>
            <th class="col-image">画像</th>
            <th class="col-product">商品名</th>
            <th class="col-company">会社</th>
            <th class="col-category">カテゴリ</th>
            <th class="col-price">金額(税別)</th>
            <th class="col-stock">在庫数</th>
            <th class="col-edit">編集</th>
          </tr>
        </thead>
        <tbody id="gridBody">
          <!-- JSで行を挿入 -->
        </tbody>
      </table>
    </section>
  </main>

  <footer class="main-footer">
    <div class="footerBtn-wrap">
      <a class="footer-btn" href="top.html">TOPへ</a>
    </div>
  </footer>
</body>

</html>
